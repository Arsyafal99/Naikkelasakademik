<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Pemesanan - Naik Kelas Akademik</title>

    <!-- Tailwind CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />

    <!-- CSS Kustom (bila ada) -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-gray-50 text-gray-800">
    <!-- Navbar (navigasi atas) -->
    <header class="fixed top-0 w-full z-50 bg-white shadow">
      <div
        class="container mx-auto flex items-center justify-between py-4 px-6"
      >
        <!-- Logo + Judul Brand -->
        <a href="index.html" class="flex items-center space-x-3">
          <img
            src="img/favicon.png"
            alt="Logo Naik Kelas"
            class="h-10 w-10 object-contain"
          />
          <span class="text-2xl font-bold text-blue-700"
            >Naik Kelas Akademik</span
          >
        </a>

        <!-- Menu responsive toggle -->
        <button
          class="md:hidden focus:outline-none"
          id="menu-toggle"
          aria-label="Toggle Navigation"
        >
          <svg
            class="w-6 h-6 text-gray-700"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>

        <!-- Menu link -->
        <nav
          id="nav-menu"
          class="hidden md:flex flex-col md:flex-row md:items-center absolute md:static top-full left-0 w-full md:w-auto bg-white md:bg-transparent shadow md:shadow-none px-6 py-4 md:py-0 transition-all duration-300"
        >
          <a
            href="index.html"
            class="block py-2 md:py-0 md:px-4 text-gray-700 hover:text-blue-500"
            >Beranda</a
          >
          <a
            href="tentang.html"
            class="block py-2 md:py-0 md:px-4 text-gray-700 hover:text-blue-500"
            >Tentang</a
          >
          <a
            href="layanan.html"
            class="block py-2 md:py-0 md:px-4 text-gray-700 hover:text-blue-500"
            >Layanan</a
          >
        </nav>
      </div>
    </header>

    <!-- Hero Judul Formulir -->
    <section
      class="pt-32 pb-12 bg-gradient-to-r from-indigo-100 to-blue-200 text-center"
    >
      <h1 class="text-4xl font-bold text-gray-800 mb-3">
        Form Pemesanan Tugas
      </h1>
      <p class="text-lg text-gray-700">
        Isi form ini agar kami bisa membantu menyelesaikan tugas kamu secara
        profesional!
      </p>
    </section>

    <!-- Form Pemesanan -->
    <section class="py-16 bg-white">
      <div class="container mx-auto px-6 max-w-3xl">
        <form
          action="https://formsubmit.co/arsyafal99@gmail.com"
          method="POST"
          class="bg-white shadow-lg rounded-xl p-8 space-y-6"
        >
          <!-- Nama -->
          <div>
            <label
              for="nama"
              class="block text-sm font-medium text-gray-700 mb-1"
              >Nama Lengkap</label
            >
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-400">👤</span>
              <input
                type="text"
                name="nama"
                id="nama"
                required
                placeholder="Nama Lengkap"
                class="pl-10 w-full border border-gray-300 rounded-md p-3 focus:ring focus:ring-blue-200"
              />
            </div>
          </div>

          <!-- Email -->
          <div>
            <label
              for="email"
              class="block text-sm font-medium text-gray-700 mb-1"
              >Email</label
            >
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-400">📧</span>
              <input
                type="email"
                name="email"
                id="email"
                required
                placeholder="Alamat Email Aktif"
                class="pl-10 w-full border border-gray-300 rounded-md p-3 focus:ring focus:ring-blue-200"
              />
            </div>
          </div>

          <!-- Nomor WA -->
          <div>
            <label
              for="nomor"
              class="block text-sm font-medium text-gray-700 mb-1"
              >Nomor WhatsApp</label
            >
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-400">📱</span>
              <input
                type="text"
                name="nomor"
                id="nomor"
                required
                placeholder="08xxxxxxxxxx"
                class="pl-10 w-full border border-gray-300 rounded-md p-3 focus:ring focus:ring-blue-200"
              />
            </div>
          </div>

          <!-- Kategori -->
          <div>
            <label
              for="kategori"
              class="block text-sm font-medium text-gray-700 mb-1"
              >Kategori Tugas</label
            >
            <select
              name="kategori"
              id="kategori"
              required
              class="block w-full border border-gray-300 rounded-md p-3 focus:ring focus:ring-blue-200"
            >
              <option value="">-- Pilih Kategori --</option>
              <option value="Perkuliahan">Perkuliahan</option>
              <option value="Sekolahan">Sekolahan</option>
              <option value="Custom">Custom / Bebas</option>
            </select>
          </div>

          <!-- Deskripsi Tugas -->
          <div>
            <label
              for="deskripsi"
              class="block text-sm font-medium text-gray-700 mb-1"
              >Deskripsi Tugas</label
            >
            <div class="relative">
              <span class="absolute left-3 top-3 text-gray-400">📝</span>
              <textarea
                name="deskripsi"
                id="deskripsi"
                rows="5"
                required
                placeholder="Tuliskan detail tugas kamu..."
                class="pl-10 w-full border border-gray-300 rounded-md p-3 focus:ring focus:ring-blue-200"
              ></textarea>
            </div>
          </div>

          <!-- FormSubmit hidden config -->
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_next" value="thankyou.html" />

          <!-- Tombol Submit -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold py-3 rounded-md hover:from-blue-700 hover:to-indigo-700 transition shadow-lg text-lg flex items-center justify-center gap-2"
          >
            🚀 Kirim & Tunggu Balasan WA
          </button>
        </form>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white py-6 mt-16 shadow-inner">
      <div class="container mx-auto px-4 text-center text-sm text-gray-600">
        © 2025 Naik Kelas Akademik. Naik Kualitas, Naik Kelas.
      </div>
    </footer>

    <!-- Script JS Tambahan (opsional) -->
    <script src="js/script.js"></script>
    <!-- SCRIPT AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
